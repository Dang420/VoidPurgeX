<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidPurgeX | UwillSurrender</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .console-box { width: 90%; max-width: 500px; border: 2px solid #8000ff; background: #000; box-shadow: 0 0 30px #8000ff; border-radius: 8px; padding: 20px; }
        .glitch-title { color: #8000ff; font-weight: bold; text-align: center; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 2px 2px #00ffff; font-size: 1.5rem; }
        #terminal { font-size: 0.85rem; line-height: 1.6; height: 250px; overflow-y: auto; border-top: 1px solid #333; padding-top: 15px; margin-bottom: 20px; color: #00ff00; }
        .btn { display: block; width: 100%; background: transparent; border: 1px solid #00ffff; color: #00ffff; padding: 15px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }
        
        /* The Clickable Command Box */
        .copy-box { 
            background: #111; border: 1px dashed #8000ff; color: #fff; 
            padding: 10px; margin-top: 10px; font-size: 0.75rem; 
            word-break: break-all; cursor: pointer; position: relative;
        }
        .copy-box:active { background: #222; }
        .copy-hint { color: #8000ff; font-size: 0.6rem; display: block; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="console-box">
        <div class="glitch-title">VOIDPURGEX v1.0</div>
        <div id="terminal">
            <p>> [STATUS]: STANDBY</p>
            <p>> [USER]: UWILLSURRENDER</p>
            <p>> [TARGET]: DIGITAL DEBRIS</p>
        </div>
        <button class="btn" id="mainBtn" onclick="runDiagnostics()">Initiate Scan & Purge</button>
    </div>

    <script>
        const command = "curl -sL https://raw.githubusercontent.com/Dang420/VoidPurgeX/main/voidpurge.sh | bash";
        const logs = [
            "> Initializing Nix-Optimized Engine...",
            "> Scanning /nix/store for unreferenced links...",
            "> FOUND: 413MB of temporary debris.",
            "> Analyzing generations... [OK]",
            "> Cross-referencing UwillSurrender protocols...",
            "> [READY]: OPTIMIZATION CALCULATED.",
            "> ---------------------------------------",
            "> FINAL STEP: TAP BELOW TO COPY COMMAND",
        ];

        function runDiagnostics() {
            const terminal = document.getElementById('terminal');
            const btn = document.getElementById('mainBtn');
            btn.style.display = 'none'; // Hide button during scan
            terminal.innerHTML = ""; 
            let i = 0;

            function typeLog() {
                if (i < logs.length) {
                    let p = document.createElement('div');
                    p.innerHTML = logs[i];
                    terminal.appendChild(p);
                    terminal.scrollTop = terminal.scrollHeight;
                    i++;
                    setTimeout(typeLog, 400);
                } else {
                    // Create the clickable copy box
                    const div = document.createElement('div');
                    div.className = "copy-box";
                    div.innerHTML = command + "<span class='copy-hint' id='hint'>[ Tap to Copy ]</span>";
                    div.onclick = function() {
                        navigator.clipboard.writeText(command);
                        document.getElementById('hint').innerHTML = "[ COPIED TO CLIPBOARD! ]";
                        document.getElementById('hint').style.color = "#00ff00";
                    };
                    terminal.appendChild(div);
                }
            }
            typeLog();
        }
    </script>
</body>
</html>
