<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VoidPurgeX | UwillSurrender</title>
    <style>
        body { background: #0a0a0a; color: #00ffff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .console { background: #000; border: 2px solid #8000ff; padding: 20px; width: 80%; max-width: 600px; box-shadow: 0 0 20px #8000ff; border-radius: 10px; }
        h1 { color: #8000ff; text-transform: uppercase; letter-spacing: 5px; }
        .btn { background: transparent; border: 1px solid #00ffff; color: #00ffff; padding: 10px 20px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; margin-top: 20px; }
        .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }
        #output { color: #00ff00; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>VoidPurgeX</h1>
    <div class="console">
        <p>> STATUS: System Idle...</p>
        <p>> TARGET: Digital Debris</p>
        <button class="btn" onclick="startPurge()">INITIATE PURGE</button>
        <div id="output"></div>
    </div>

    <script>
        function startPurge() {
            const out = document.getElementById('output');
            out.innerHTML = "Connecting to GitHub engine...<br>";
            setTimeout(() => { out.innerHTML += "Analyzing Nix Store...<br>"; }, 500);
            setTimeout(() => { out.innerHTML += "<strong>PURGE INITIATED.</strong><br>"; }, 1000);
            setTimeout(() => { 
                out.innerHTML += "<br>COPY THIS COMMAND TO RUN LOCALLY:<br>";
                out.innerHTML += "<code style='color:white'>curl -sL https://raw.githubusercontent.com/Dang420/VoidPurgeX/main/voidpurge.sh | bash</code>";
            }, 2000);
        }
    </script>
</body>
</html>
