<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidPurgeX | UwillSurrender</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .console-box { width: 92%; max-width: 450px; border: 2px solid #8000ff; background: #000; box-shadow: 0 0 30px #8000ff; border-radius: 15px; padding: 30px; position: relative; }
        .glitch-title { color: #8000ff; font-weight: bold; text-align: center; letter-spacing: 5px; margin-bottom: 25px; text-shadow: 2px 2px #00ffff; font-size: 1.6rem; }
        
        /* The main display area */
        #content-area { min-height: 300px; display: flex; flex-direction: column; }
        
        .result-line { margin-bottom: 12px; font-size: 0.95rem; display: flex; align-items: center; }
        .status-ok { color: #00ff00; margin-left: 10px; font-weight: bold; }
        .data-found { color: #ff00ff; font-weight: bold; }

        .btn { width: 100%; background: transparent; border: 2px solid #00ffff; color: #00ffff; padding: 20px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; margin-top: auto; }
        .btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 25px #00ffff; }
        
        /* Copy Tool */
        .copy-trigger { background: #111; border: 1px dashed #8000ff; padding: 15px; margin-top: 20px; cursor: pointer; text-align: center; border-radius: 5px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .copy-trigger:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="console-box">
        <div class="glitch-title">VOIDPURGEX</div>
        
        <div id="content-area">
            <div id="output">
                <p style="text-align:center; color:#555;">[ SYSTEM READY ]</p>
                <p style="text-align:center; color:#555;">OPERATOR: UWILLSURRENDER</p>
            </div>
            <button class="btn" id="startBtn" onclick="initiateScan()">Run System Purge</button>
        </div>
    </div>

    <script>
        const commandText = "curl -sL https://raw.githubusercontent.com/Dang420/VoidPurgeX/main/voidpurge.sh | bash";
        
        const scanSteps = [
            { txt: "> Initializing Nix Engine...", res: "OK" },
            { txt: "> Scanning for Debris...", res: "413MB FOUND" },
            { txt: "> Checking Generations...", res: "CLEANUP READY" },
            { txt: "> UwillSurrender Protocols...", res: "LOADED" },
            { txt: "> Optimization Map...", res: "GENERATED" }
        ];

        function initiateScan() {
            const output = document.getElementById('output');
            const btn = document.getElementById('startBtn');
            
            output.innerHTML = ""; // Clear the welcome text
            btn.style.display = "none"; // Remove the button

            let i = 0;
            function typeNext() {
                if (i < scanSteps.length) {
                    let div = document.createElement('div');
                    div.className = "result-line";
                    
                    // Highlight the "413MB" part specifically
                    let statusClass = scanSteps[i].res.includes("FOUND") ? "data-found" : "status-ok";
                    
                    div.innerHTML = `<span>${scanSteps[i].txt}</span><span class="${statusClass}">[${scanSteps[i].res}]</span>`;
                    output.appendChild(div);
                    i++;
                    setTimeout(typeNext, 700);
                } else {
                    showFinalAction();
                }
            }
            typeNext();
        }

        function showFinalAction() {
            const output = document.getElementById('output');
            const finalBox = document.createElement('div');
            finalBox.className = "copy-trigger";
            finalBox.innerHTML = `
                <div style="color:#8000ff; font-weight:bold; margin-bottom:10px;">SCAN COMPLETE</div>
                <div style="font-size:0.7rem; color:#fff; word-break:break-all; margin-bottom:10px;">${commandText}</div>
                <div id="copyNotice" style="color:#00ffff; font-size:0.8rem;">TAP TO FINALIZE PURGE</div>
            `;
            
            finalBox.onclick = function() {
                navigator.clipboard.writeText(commandText);
                document.getElementById('copyNotice').innerHTML = "COPIED! PASTE IN TERMUX NOW";
                document.getElementById('copyNotice').style.color = "#00ff00";
            };
            
            output.appendChild(finalBox);
        }
    </script>
</body>
</html>
